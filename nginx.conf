# Nginx reverse proxy configuration for Spring Boot Application

server {
    listen 80;
    listen [::]:80;
    
    # Replace with your domain name or public IP
    server_name _; 

    # Access log
    access_log /var/log/nginx/ai_tools_hub_access.log;
    error_log /var/log/nginx/ai_tools_hub_error.log;

    location / {
        proxy_pass http://localhost:8080;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Websocket support (optional)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Cache static resources for better performance
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:8080;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

