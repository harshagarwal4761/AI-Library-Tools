<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Personal AI Tools Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/app.js}"></script>
</head>
<body onload="initAuthPage()">
    <div class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">✨</div>
                    <h1 class="auth-title">Create Account</h1>
                    <p class="auth-subtitle">Start building your AI workspace</p>
                </div>

                <div id="signup-error" class="error-message"></div>
                <div id="signup-success" class="success-message"></div>

                <form onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label class="form-label" for="signup-username">Username</label>
                        <input type="text" id="signup-username" class="form-input" placeholder="Choose a username" required minlength="3">
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label class="form-label" for="signup-password">Password</label>
                        <input type="password" id="signup-password" class="form-input" placeholder="Create a password" required minlength="6">
                    </div>

                    <button type="submit" id="signup-btn" class="btn btn-primary">Create Account</button>
                </form>

                <div class="auth-link">
                    Already have an account? <a href="/login">Sign in</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
