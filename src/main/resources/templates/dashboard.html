<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Personal AI Tools Hub</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/app.js}"></script>
</head>
<body onload="initDashboard()">
    <div class="dashboard-wrapper">
        <nav class="navbar">
            <a href="/dashboard" class="navbar-brand">
                <div class="navbar-logo">🚀</div>
                <div class="navbar-title">AI Tools Hub</div>
            </a>
            <div class="navbar-right">
                <div class="navbar-user">Hello, <span id="display-username">User</span></div>
                <button onclick="logout()" class="btn btn-ghost">Sign Out</button>
                <button id="theme-toggle" class="btn btn-ghost" onclick="toggleTheme()">🌙</button>
            </div>
        </nav>

        <main class="main-content">
            <header class="dashboard-header">
                <h1 class="dashboard-title">Your Workspace</h1>
                <p class="dashboard-subtitle">Manage and access all your favorite AI tools in one place</p>
            </header>

            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="tools-count">0</div>
                    <div class="stat-label">Total Tools</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="filtered-count">0</div>
                    <div class="stat-label">Shown</div>
                </div>
            </div>

            <section class="add-tool-section">
                <div class="add-tool-header">
                    <span>➕ Add New Tool</span>
                </div>
                
                <div id="tool-error" class="error-message"></div>
                
                <form onsubmit="handleAddTool(event)" class="add-tool-form">
                    <div class="form-group">
                        <label class="form-label" for="tool-name">Tool Name</label>
                        <input type="text" id="tool-name" class="form-input" placeholder="e.g. ChatGPT, Midjourney" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="tool-url">URL</label>
                        <input type="url" id="tool-url" class="form-input" placeholder="https://..." required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="tool-tag">Category</label>
                        <select id="tool-tag" class="form-input form-select">
                            <option value="Image Generation">🖼️ Image Generation</option>
                            <option value="Video Generation">🎬 Video Generation</option>
                            <option value="Coding">💻 Coding</option>
                            <option value="Project Development">🛠️ Project Development</option>
                            <option value="General Help">💬 General Help</option>
                            <option value="Agentic AI">🤖 Agentic AI</option>
                            <option value="PPT Generation">📊 PPT Generation</option>
                            <option value="Others" selected>🔧 Others</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Tool</button>
                </form>
            </section>

            <!-- Filter Bar -->
            <section class="filter-bar-section">
                <div class="filter-label">Filter by Category</div>
                <div class="filter-bar" id="filter-bar">
                    <button class="filter-pill active" data-tag="all" onclick="filterTools('all', this)">All</button>
                    <button class="filter-pill" data-tag="Image Generation" onclick="filterTools('Image Generation', this)">🖼️ Image Generation</button>
                    <button class="filter-pill" data-tag="Video Generation" onclick="filterTools('Video Generation', this)">🎬 Video Generation</button>
                    <button class="filter-pill" data-tag="Coding" onclick="filterTools('Coding', this)">💻 Coding</button>
                    <button class="filter-pill" data-tag="Project Development" onclick="filterTools('Project Development', this)">🛠️ Project Development</button>
                    <button class="filter-pill" data-tag="General Help" onclick="filterTools('General Help', this)">💬 General Help</button>
                    <button class="filter-pill" data-tag="Agentic AI" onclick="filterTools('Agentic AI', this)">🤖 Agentic AI</button>
                    <button class="filter-pill" data-tag="PPT Generation" onclick="filterTools('PPT Generation', this)">📊 PPT Generation</button>
                    <button class="filter-pill" data-tag="Others" onclick="filterTools('Others', this)">🔧 Others</button>
                </div>
            </section>

            <section class="tools-section">
                <div id="tools-grid" class="tools-grid">
                    <!-- Tools injected by JS -->
                    <div class="empty-state">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
